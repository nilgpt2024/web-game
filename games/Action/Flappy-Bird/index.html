<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="经典Flappy Bird游戏 - 控制小鸟飞越管道！">
  <title>Flappy Bird - 飞扬的小鸟</title>
  
  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>🐦</text></svg>">
  
  <!-- 字体 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Pacifico&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- 共享样式: game-shared.css 在 games/ 目录下 -->
  <!-- 路径: Flappy-Bird -> Action -> games = ../../ + game-shared.css -->
  <link rel="stylesheet" href="../../game-shared.css">
  
  <!-- 样式表 -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <!-- Navigation -->
  <nav class="game-nav-fixed">
    <!-- 返回主页: Flappy-Bird -> Action -> games -> 根目录 = ../../../ -->
    <a href="../../../index.html" class="back-btn">
      <i class="fas fa-arrow-left"></i>
      <span data-i18n="common.backToHub">返回游戏大厅</span>
    </a>
    <div class="nav-right">
      <div class="lang-switcher">
        <button class="lang-btn active" data-lang="zh-CN" title="中文">
          <span class="lang-flag">🇨🇳</span>
          <span class="lang-text">中文</span>
        </button>
        <button class="lang-btn" data-lang="en" title="English">
          <span class="lang-flag">🇺🇸</span>
          <span class="lang-text">EN</span>
        </button>
      </div>
    </div>
  </nav>

  <!-- 游戏容器 -->
  <div class="game-container">
    <!-- 游戏标题 -->
    <header class="game-header">
      <h1 class="game-title">
        <span class="icon">🐦</span>
        <span data-i18n="specific.Flappy-Bird.title">Flappy Bird</span>
      </h1>
      <p class="game-subtitle" data-i18n="specific.Flappy-Bird.desc">点击或按空格键控制小鸟飞翔</p>
    </header>

    <!-- 游戏画布 -->
    <main class="game-main">
      <div class="game-card-shell">
        <div class="game-card-core">
          <canvas 
            id="myCanvas" 
            width="620" 
            height="480"
            aria-label="Flappy Bird游戏画布"
          >
            您的浏览器不支持Canvas，请升级浏览器！
          </canvas>
        </div>
      </div>
    </main>

    <!-- 游戏信息 -->
    <footer class="game-footer">
      <div class="game-info">
        <div class="info-item">
          <span class="info-icon">🎮</span>
          <span class="info-text" data-i18n="specific.Flappy-Bird.control">点击屏幕或按空格键控制</span>
        </div>
        <div class="info-item">
          <span class="info-icon">🎯</span>
          <span class="info-text" data-i18n="specific.Flappy-Bird.goal">避开管道，飞得更远！</span>
        </div>
      </div>
      
      <!-- 功能介绍 -->
      <div class="game-features">
        <h3 class="features-title" data-i18n="ui.features">✨ 游戏特色</h3>
        <div class="features-grid">
          <div class="feature-tag" data-i18n="ui.realTimeScore">📊 实时计分</div>
          <div class="feature-tag" data-i18n="ui.highScoreRecord">🏆 最高分记录</div>
          <div class="feature-tag" data-i18n="ui.newRecord">🎉 破纪录提示</div>
          <div class="feature-tag" data-i18n="ui.localSave">💾 本地存储</div>
        </div>
      </div>
    </footer>
  </div>

  <!-- 游戏国际化脚本: 在项目根目录 -->
  <!-- 路径: Flappy-Bird -> Action -> games -> 根目录 = ../../../ -->
  <script src="../../../game-i18n.js"></script>
  
  <!-- 游戏脚本 -->
  <script src="script.js"></script>
  
  <script>
    // 初始化游戏国际化
    const gameI18n = new GameI18n({ gameName: 'Flappy-Bird' });
    gameI18n.init();
  </script>
</body>
</html>
