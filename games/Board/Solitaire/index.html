<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solitaire | 纸牌接龙</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🃏</text></svg>">
  <link rel="stylesheet" href="../../game-shared.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="game-nav-fixed">
    <a href="../../../index.html" class="back-btn">
      <i class="fas fa-arrow-left"></i>
      <span data-i18n="common.backToHub">返回游戏大厅</span>
    </a>
    <div class="nav-right">
      <div class="lang-switcher">
        <button class="lang-btn active" data-lang="zh-CN" title="中文">
          <span class="lang-flag">🇨🇳</span>
          <span class="lang-text">中文</span>
        </button>
        <button class="lang-btn" data-lang="en" title="English">
          <span class="lang-flag">🇺🇸</span>
          <span class="lang-text">EN</span>
        </button>
      </div>
    </div>
  </nav>

  <div class="game-container">
    <header class="header">
      <h1 class="title">🃏 Solitaire</h1>
      <p class="subtitle" data-i18n="solitaire.subtitle">经典纸牌接龙 - Klondike</p>
    </header>

    <div class="info-bar">
      <div class="info-item">
        <span class="info-label" data-i18n="common.time">⏱️ 时间</span>
        <span class="info-value" id="timer">00:00</span>
      </div>
      <div class="info-item">
        <span class="info-label" data-i18n="solitaire.moves">👆 步数</span>
        <span class="info-value" id="moves">0</span>
      </div>
      <div class="info-item">
        <span class="info-label" data-i18n="common.score">📊 得分</span>
        <span class="info-value" id="score">0</span>
      </div>
    </div>

    <div class="solitaire-board" id="board">

      <div class="top-row">
        <div class="stock-pile" id="stock" data-pile="stock">
          <div class="pile-slot"></div>
        </div>
        <div class="waste-pile" id="waste" data-pile="waste">
          <div class="pile-slot"></div>
        </div>
        <div class="foundation-area">
          <div class="foundation-pile" id="foundation-0" data-pile="foundation" data-suit="hearts">
            <div class="pile-slot foundation-slot"><span>♥</span></div>
          </div>
          <div class="foundation-pile" id="foundation-1" data-pile="foundation" data-suit="diamonds">
            <div class="pile-slot foundation-slot"><span>♦</span></div>
          </div>
          <div class="foundation-pile" id="foundation-2" data-pile="foundation" data-suit="clubs">
            <div class="pile-slot foundation-slot"><span>♣</span></div>
          </div>
          <div class="foundation-pile" id="foundation-3" data-pile="foundation" data-suit="spades">
            <div class="pile-slot foundation-slot"><span>♠</span></div>
          </div>
        </div>
      </div>

      <div class="tableau-area" id="tableau">
        <div class="tableau-pile" data-pile="tableau" data-column="0"><div class="pile-slot tableau-slot"></div></div>
        <div class="tableau-pile" data-pile="tableau" data-column="1"><div class="pile-slot tableau-slot"></div></div>
        <div class="tableau-pile" data-pile="tableau" data-column="2"><div class="pile-slot tableau-slot"></div></div>
        <div class="tableau-pile" data-pile="tableau" data-column="3"><div class="pile-slot tableau-slot"></div></div>
        <div class="tableau-pile" data-pile="tableau" data-column="4"><div class="pile-slot tableau-slot"></div></div>
        <div class="tableau-pile" data-pile="tableau" data-column="5"><div class="pile-slot tableau-slot"></div></div>
        <div class="tableau-pile" data-pile="tableau" data-column="6"><div class="pile-slot tableau-slot"></div></div>
      </div>
    </div>

    <div class="controls">
      <button class="control-btn" id="newGameBtn">
        <span class="btn-icon">🎮</span>
        <span class="btn-text" data-i18n="common.newGame">新游戏</span>
      </button>
      <button class="control-btn" id="undoBtn">
        <span class="btn-icon">↩️</span>
        <span class="btn-text" data-i18n="solitaire.undo">撤销</span>
      </button>
      <button class="control-btn" id="autoCompleteBtn">
        <span class="btn-icon">⚡</span>
        <span class="btn-text" data-i18n="solitaire.autoComplete">自动完成</span>
      </button>
      <button class="control-btn" id="hintBtn">
        <span class="btn-icon">💡</span>
        <span class="btn-text" data-i18n="solitaire.hint">提示</span>
      </button>
    </div>

    <div class="instructions">
      <h3 data-i18n="solitaire.rulesTitle">📖 游戏规则</h3>
      <ul>
        <li data-i18n="solitaire.rule1">目标：将所有牌按花色从 A 到 K 移到右上角的四个目标堆</li>
        <li data-i18n="solitaire.rule2">点击发牌堆翻牌，拖拽或点击卡牌移动</li>
        <li data-i18n="solitaire.rule3">牌堆中必须红黑交替、数字递减放置</li>
        <li data-i18n="solitaire.rule4">目标堆按同花色从 A 开始递增堆叠</li>
        <li data-i18n="solitaire.rule5">只有 K 可以放到空的牌堆位置</li>
        <li data-i18n="solitaire.rule6">移到目标堆 +10 分，翻牌 +5 分，从目标堆移出 -15 分</li>
      </ul>
    </div>
  </div>

  <div class="modal" id="winModal">
    <div class="modal-content">
      <div class="win-content">
        <div class="win-icon">🎉</div>
        <h2 data-i18n="solitaire.congratulations">恭喜完成！</h2>
        <div class="win-stats">
          <div class="stat-item">
            <span class="stat-label" data-i18n="common.time">用时</span>
            <span class="stat-value" id="finalTime">00:00</span>
          </div>
          <div class="stat-item">
            <span class="stat-label" data-i18n="solitaire.moves">步数</span>
            <span class="stat-value" id="finalMoves">0</span>
          </div>
          <div class="stat-item">
            <span class="stat-label" data-i18n="common.score">得分</span>
            <span class="stat-value" id="finalScore">0</span>
          </div>
        </div>
        <button class="modal-btn" id="playAgainBtn" data-i18n="common.tryAgain">再玩一次</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="../../../game-i18n.js"></script>
  <script>
    const gameI18n = new GameI18n({ gameName: 'Solitaire' });
    gameI18n.init();
  </script>
</body>
</html>
